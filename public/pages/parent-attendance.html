<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance History</title><link rel="stylesheet" href="/css/style.css">
<style>
    .child-photo-sm { width:28px; height:28px; border-radius:50%; object-fit:cover; vertical-align:middle; margin-right:8px; }
    .child-photo-pl-sm { width:28px; height:28px; border-radius:50%; background:#e2e8f0; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#64748b; vertical-align:middle; margin-right:8px; }
    .summary-row { display:flex; gap:16px; padding:12px 0; }
    .summary-item { text-align:center; flex:1; }
    .summary-num { font-size:28px; font-weight:700; }
    .summary-lbl { font-size:12px; color:var(--gray); }
</style>
</head><body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
<div class="topbar" id="topbar"></div>
<div id="alert-container"></div>

<div class="filter-bar">
    <div class="form-group"><label>From</label><input type="date" class="form-control" id="attFrom"></div>
    <div class="form-group"><label>To</label><input type="date" class="form-control" id="attTo"></div>
    <button class="btn btn-primary" onclick="loadAttendance()">Refresh</button>
</div>

<div id="attendance-history"><div class="loading">Loading...</div></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js?v=1"></script>
<script>
auth.requireAuth();

const today = app.localDate();
const d = new Date(); d.setDate(d.getDate() - 30);
const thirtyDaysAgo = d.toISOString().slice(0, 10);
document.getElementById('attFrom').value = thirtyDaysAgo;
document.getElementById('attTo').value = today;

async function loadAttendance() {
    try {
        const result = await api.getParentAttendance(
            document.getElementById('attFrom').value,
            document.getElementById('attTo').value
        );
        const children = result.data || [];

        if (children.length === 0) {
            document.getElementById('attendance-history').innerHTML = '<p style="text-align:center;padding:40px;color:var(--gray);">No records found.</p>';
            return;
        }

        let html = '';
        children.forEach(child => {
            const records = child.attendance_records || [];
            const present = records.filter(r => r.status === 'Present').length;
            const late = records.filter(r => r.status === 'Late').length;
            const absent = records.filter(r => r.status === 'Absent').length;
            const photo = child.photo
                ? `<img src="${child.photo}" class="child-photo-sm">`
                : `<div class="child-photo-pl-sm">${(child.first_name || '?')[0]}</div>`;

            html += `<div class="card" style="margin-bottom:16px;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                    ${photo}
                    <div>
                        <strong style="font-size:16px;">${child.first_name} ${child.last_name}</strong>
                        <span style="font-size:13px;color:var(--gray);margin-left:8px;">${child.grade_level || ''} ${child.section_name || ''}</span>
                    </div>
                </div>
                <div class="summary-row">
                    <div class="summary-item"><div class="summary-num" style="color:var(--success)">${present}</div><div class="summary-lbl">Present</div></div>
                    <div class="summary-item"><div class="summary-num" style="color:var(--warning)">${late}</div><div class="summary-lbl">Late</div></div>
                    <div class="summary-item"><div class="summary-num" style="color:var(--danger)">${absent}</div><div class="summary-lbl">Absent</div></div>
                    <div class="summary-item"><div class="summary-num" style="color:var(--primary)">${records.length}</div><div class="summary-lbl">Total Days</div></div>
                </div>`;

            if (records.length > 0) {
                html += `<div class="table-responsive"><table class="table"><thead><tr><th>Date</th><th>Time In</th><th>Time Out</th><th>Status</th><th>Remarks</th></tr></thead><tbody>`;
                records.forEach(r => {
                    // Extract subject from remarks for display
                    let displayRemarks = (r.remarks || '').replace(/\[Subject:\s*\d+\]\s*/g, '').trim() || '-';
                    html += `<tr>
                        <td>${app.formatDate(r.attendance_date)}</td>
                        <td>${app.formatTime(r.time_in)}</td>
                        <td>${app.formatTime(r.time_out)}</td>
                        <td>${app.statusBadge(r.status)}</td>
                        <td style="font-size:13px;color:var(--gray);">${displayRemarks}</td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
            }
            html += `</div>`;
        });

        document.getElementById('attendance-history').innerHTML = html;
    } catch (err) {
        document.getElementById('attendance-history').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
}

loadAttendance();
</script>
</body></html>
