<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><link rel="icon" href="/img/LogoINSH.png"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Portal</title><link rel="stylesheet" href="/css/style.css">
<style>
    .child-card { border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; background:#fff; }
    .child-header { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
    .child-photo { width:56px; height:56px; border-radius:50%; object-fit:cover; }
    .child-photo-pl { width:56px; height:56px; border-radius:50%; background:#e2e8f0; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; color:#64748b; }
    .today-status { display:inline-block; padding:4px 16px; border-radius:20px; font-weight:600; font-size:14px; }
    .status-inside { background:#f0fdf4; color:#16a34a; }
    .status-outside { background:#fef3c7; color:#d97706; }
    .status-not-entered { background:#f1f5f9; color:#64748b; }
    .quick-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .quick-actions a { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; text-decoration:none; }
    .recent-scan { padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:14px; display:flex; justify-content:space-between; }
</style>
</head><body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
<div class="topbar" id="topbar"></div>
<div id="alert-container"></div>

<div id="children-dashboard"></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js?v=1"></script>
<script>
auth.requireAuth();

async function loadDashboard() {
    try {
        const result = await api.getParentDashboard();
        const data = result.data;
        const container = document.getElementById('children-dashboard');

        if (!data.children || data.children.length === 0) {
            container.innerHTML = '<div class="card"><p style="text-align:center; color:var(--gray); padding:40px;">No children linked to your account.</p></div>';
            return;
        }

        // Get today's info for all children
        const today = app.localDate();
        const childIds = data.children.map(c => c.student_id);

        let html = '<h2 style="margin-bottom:16px;">👋 My Children</h2>';

        for (const child of data.children) {
            // Fetch today's scan status
            let todayStatus = 'Not Yet Entered';
            let todayStatusClass = 'status-not-entered';
            let todayScans = [];
            try {
                const scans = await api.getScanLogs({ student_id: child.student_id, date: today });
                todayScans = scans.data || [];
                const hasEntry = todayScans.some(s => s.scan_type === 'ENTRY');
                const hasExitAfterEntry = todayScans.some(s => s.scan_type === 'EXIT' && s.exit_type === 'Dismissal');
                if (hasExitAfterEntry) {
                    todayStatus = 'Departed';
                    todayStatusClass = 'status-outside';
                } else if (hasEntry) {
                    todayStatus = 'Inside Campus';
                    todayStatusClass = 'status-inside';
                }
            } catch (_) {}

            const photo = child.photo
                ? `<img src="${child.photo}" class="child-photo">`
                : `<div class="child-photo-pl">${(child.first_name || '?')[0]}</div>`;

            html += `<div class="child-card">
                <div class="child-header">
                    ${photo}
                    <div style="flex:1;">
                        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                            <strong style="font-size:18px;">${child.first_name} ${child.last_name}</strong>
                            <span class="today-status ${todayStatusClass}">${todayStatus}</span>
                        </div>
                        <div style="font-size:14px;color:var(--gray);margin-top:2px;">
                            ${child.grade_level || ''} ${child.section_name || ''} · LRN: ${child.lrn}
                        </div>
                    </div>
                </div>`;

            // Attendance summary
            if (child.attendance_summary) {
                const s = child.attendance_summary;
                html += `<div style="display:flex;gap:20px;padding:12px 0;border-top:1px solid #f1f5f9;margin-top:8px;">
                    <div style="text-align:center;"><div style="font-size:24px;font-weight:700;color:var(--success);">${s.present_count || 0}</div><div style="font-size:12px;color:var(--gray);">Present</div></div>
                    <div style="text-align:center;"><div style="font-size:24px;font-weight:700;color:var(--warning);">${s.late_count || 0}</div><div style="font-size:12px;color:var(--gray);">Late</div></div>
                    <div style="text-align:center;"><div style="font-size:24px;font-weight:700;color:var(--danger);">${s.absent_count || 0}</div><div style="font-size:12px;color:var(--gray);">Absent</div></div>
                </div>`;
            }

            // Recent scans today
            if (todayScans.length > 0) {
                html += `<div style="border-top:1px solid #f1f5f9;padding-top:8px;margin-top:4px;">
                    <small style="font-weight:600;color:var(--gray);">Today's Activity</small>`;
                todayScans.slice(0, 5).forEach(s => {
                    const icon = s.scan_type === 'ENTRY' ? '✅' : '🚪';
                    html += `<div class="recent-scan"><span>${icon} ${s.scan_type}${s.exit_type ? ' (' + s.exit_type + ')' : ''}</span><span style="color:var(--gray);">${app.formatTime(s.scan_time)}</span></div>`;
                });
                html += `</div>`;
            }

            // Quick actions
            html += `<div class="quick-actions">
                <a href="/pages/parent-attendance.html" style="background:#eff6ff;color:#2563eb;">📋 View Attendance</a>
                <a href="/pages/parent-excuse.html" style="background:#fef3c7;color:#d97706;">📝 Submit Excuse</a>
                <a href="/pages/parent-notifications.html" style="background:#f0fdf4;color:#16a34a;">🔔 Notifications</a>
            </div>`;

            html += `</div>`;
        }

        container.innerHTML = html;
    } catch (err) {
        document.getElementById('children-dashboard').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
}

loadDashboard();
</script>
</body></html>
