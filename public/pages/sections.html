<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sections - Gate Attendance System</title><link rel="stylesheet" href="/css/style.css">
<style>
    .section-row:hover { background:#f8fafc; }
    .student-count-badge { display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600; }
    .student-count-badge.low { background:#fef2f2;color:#dc2626; }
    .student-count-badge.medium { background:#fef3c7;color:#d97706; }
    .student-count-badge.high { background:#f0fdf4;color:#16a34a; }
</style>
</head><body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
<div class="topbar" id="topbar"></div>
<div id="alert-container"></div>

<div class="filter-bar">
    <div class="form-group"><label>Grade Level</label><select class="form-select" id="filterGrade" onchange="loadSections()"><option value="">All Grades</option><option>Grade 7</option><option>Grade 8</option><option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option></select></div>
    <div class="form-group"><label>Search</label><input type="text" class="form-control" id="searchSection" placeholder="Section name..." oninput="loadSections()" style="min-width:120px;"></div>
    <button class="btn btn-primary" onclick="showAddSection()">+ Add Section</button>
</div>

<div class="card">
    <div id="sections-table"><div class="loading">Loading...</div></div>
</div>
</div>

<div id="sectionModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:30px; width:500px; max-width:90%;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
            <h3 id="sectionModalTitle" style="margin:0">Add Section</h3>
            <button type="button" onclick="closeSectionModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;padding:0;line-height:1">&times;</button>
        </div>
        <div id="form-alert" style="display:none"></div>
        <form id="sectionForm">
            <div class="form-row">
                <div class="form-group"><label>Grade Level</label><select class="form-select" id="sec_grade_level" required><option value="">Select</option><option>Grade 7</option><option>Grade 8</option><option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option></select></div>
                <div class="form-group"><label>Section Name</label><input type="text" class="form-control" id="sec_section_name" required></div>
            </div>
            <div class="form-group"><label>Adviser</label><select class="form-select" id="sec_adviser_id"><option value="">Select Adviser</option></select></div>
            <div class="form-group"><label>School Year</label><input type="text" class="form-control" id="sec_school_year" value="2026-2027"></div>
            <input type="hidden" id="sec_id">
            <div class="flex gap-10 mt-10">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-outline" onclick="closeSectionModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js?v=1"></script>
<script>
auth.requireAuth();

async function loadSections() {
    try {
        const result = await api.getSections();
        const sections = result.data || [];
        const grade = document.getElementById('filterGrade').value;
        const search = document.getElementById('searchSection').value.toLowerCase();

        const filtered = sections.filter(s =>
            (!grade || s.grade_level === grade) &&
            (!search || s.section_name.toLowerCase().includes(search))
        );

        let html = `<div class="table-responsive"><table class="table"><thead><tr>
            <th>Grade Level</th><th>Section</th><th>Students</th><th>Adviser</th><th>School Year</th><th>Status</th><th>Actions</th>
        </tr></thead><tbody>`;

        if (filtered.length === 0) {
            html += '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray);">No sections found.</td></tr>';
        }

        filtered.forEach(s => {
            const cnt = parseInt(s.student_count || 0);
            const countClass = cnt === 0 ? 'low' : cnt < 20 ? 'medium' : 'high';
            html += `<tr class="section-row">
                <td><strong>${s.grade_level}</strong></td>
                <td>${s.section_name}</td>
                <td><span class="student-count-badge ${countClass}">🎓 ${cnt}</span></td>
                <td>${s.adviser_name || 'Not assigned'}</td>
                <td>${s.school_year}</td>
                <td>${app.statusBadge(s.status)}</td>
                <td class="flex gap-10">
                    <button class="btn btn-sm btn-primary" onclick="editSection(${s.section_id})">Edit</button>
                    <button class="btn btn-sm btn-info" onclick="assignAdviser(${s.section_id})">Assign Adviser</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteSection(${s.section_id})">Delete</button>
                </td>
            </tr>`;
        });

        html += '</tbody></table></div>';
        if (filtered.length > 0) {
            html += `<div style="font-size:12px;color:var(--gray);padding:8px 16px;text-align:right;">Showing ${filtered.length} of ${sections.length} sections</div>`;
        }
        document.getElementById('sections-table').innerHTML = html;
    } catch (err) {
        document.getElementById('sections-table').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
}

async function loadTeachers() {
    try {
        const result = await api.getUsers();
        const teachers = (result.data || []).filter(u => u.role_name === 'Adviser');
        const sel = document.getElementById('sec_adviser_id');
        sel.innerHTML = '<option value="">-- Remove Adviser --</option>' + teachers.map(t => `<option value="${t.user_id}">${t.first_name} ${t.last_name}</option>`).join('');
    } catch (_) {}
}

async function editSection(id) {
    try {
        const result = await api.getSection(id);
        const s = result.data;
        document.getElementById('sectionModalTitle').textContent = 'Edit Section';
        document.getElementById('sec_id').value = s.section_id;
        document.getElementById('sec_grade_level').value = s.grade_level;
        document.getElementById('sec_section_name').value = s.section_name;
        document.getElementById('sec_school_year').value = s.school_year;
        await loadTeachers();
        if (s.adviser_id) document.getElementById('sec_adviser_id').value = s.adviser_id;
        showSectionModal();
    } catch (err) { app.showAlert(err.message, 'danger'); }
}

function showAddSection() {
    document.getElementById('sectionModalTitle').textContent = 'Add Section';
    document.getElementById('sectionForm').reset();
    document.getElementById('sec_id').value = '';
    loadTeachers();
    showSectionModal();
}

function showSectionModal() { document.getElementById('sectionModal').style.display = 'flex'; }
function closeSectionModal() { document.getElementById('sectionModal').style.display = 'none'; }

async function deleteSection(id) {
    if (!await app.confirmAction('Delete this section?')) return;
    try { await api.deleteSection(id); app.showAlert('Section deleted'); loadSections(); }
    catch (err) { app.showAlert(err.message, 'danger'); }
}

async function assignAdviser(id) {
    try {
        const result = await api.getUsers();
        const teachers = (result.data || []).filter(u => u.role_name === 'Adviser');
        const section = await api.getSection(id);
        const current = section.data.adviser_id || '';

        const div = document.createElement('div');
        div.innerHTML = `
            <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)event.target.closest('div').remove()">
                <div style="background:#fff;border-radius:12px;padding:30px;width:400px;max-width:90%;">
                    <h3 style="margin:0 0 15px">Assign Adviser</h3>
                    <div class="form-group">
                        <label>Select Adviser</label>
                        <select class="form-select" id="assign_adviser_select">
                            <option value="">-- Remove Adviser --</option>
                            ${teachers.map(t => `<option value="${t.user_id}">${t.first_name} ${t.last_name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex gap-10 mt-10">
                        <button class="btn btn-primary" id="assignAdviserBtn">Save</button>
                        <button class="btn btn-outline" onclick="this.closest('[style*=\\'fixed\\']').remove()">Cancel</button>
                    </div>
                </div>
            </div>`;
        document.body.appendChild(div.firstElementChild);
        document.getElementById('assign_adviser_select').value = current;

        document.getElementById('assignAdviserBtn').addEventListener('click', async function() {
            const sel = document.getElementById('assign_adviser_select');
            const adviserId = sel.value ? parseInt(sel.value) : null;
            try {
                await api.assignAdviser(id, adviserId);
                app.showAlert('Adviser assigned');
                loadSections();
                this.closest('[style*="fixed"]').remove();
            } catch (err) { app.showAlert(err.message, 'danger'); }
        });
    } catch (err) { app.showAlert(err.message, 'danger'); }
}

document.getElementById('sectionForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('sec_id').value;
    const data = {
        grade_level: document.getElementById('sec_grade_level').value,
        section_name: document.getElementById('sec_section_name').value,
        adviser_id: document.getElementById('sec_adviser_id').value ? parseInt(document.getElementById('sec_adviser_id').value) : null,
        school_year: document.getElementById('sec_school_year').value,
    };
    try {
        if (id) { await api.updateSection(id, data); app.showFormAlert('Section updated!', 'success'); }
        else { await api.createSection(data); app.showFormAlert('Section created!', 'success'); }
        setTimeout(() => { closeSectionModal(); loadSections(); }, 1500);
    } catch (err) { app.showFormAlert(err.message, 'danger'); }
});

loadSections();
</script>
</body></html>
