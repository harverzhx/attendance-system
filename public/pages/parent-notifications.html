<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><link rel="icon" href="/img/LogoINSH.png"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title><link rel="stylesheet" href="/css/style.css">
<style>
    .notif-card { padding:16px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
    .notif-Arrival { border-left:4px solid var(--success); }
    .notif-Departure { border-left:4px solid var(--info); }
    .notif-Late { border-left:4px solid var(--warning); }
    .notif-Dismissal { border-left:4px solid var(--primary); }
</style>
</head><body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
<div class="topbar" id="topbar"></div>
<div id="alert-container"></div>

<div class="card">
    <div class="card-header">🔔 Notification History</div>
    <div id="notification-list"><div class="loading">Loading...</div></div>
</div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js?v=1"></script>
<script>
auth.requireAuth();

async function loadNotifications() {
    try {
        const result = await api.getParentNotifications();
        const notifications = result.data || [];

        const container = document.getElementById('notification-list');
        if (notifications.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--gray);">No notifications yet.</p>';
            return;
        }

        const icons = { 'Arrival': '✅', 'Departure': '🚪', 'Late': '⏰', 'Dismissal': '🚌', 'Entry': '📥', 'Exit': '📤' };
        let html = '';
        notifications.forEach(n => {
            const typeClass = 'notif-' + n.notification_type;
            const icon = icons[n.notification_type] || '🔔';
            const statusBadge = n.send_status === 'Sent' ? 'badge-success' : n.send_status === 'Failed' ? 'badge-danger' : 'badge-warning';
            html += `<div class="notif-card ${typeClass}">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                    <div>
                        <span style="font-size:20px;margin-right:8px;">${icon}</span>
                        <strong>${n.notification_type}</strong>
                        <span class="badge ${statusBadge}" style="margin-left:8px;">${n.send_status}</span>
                        <span style="font-size:12px;color:var(--gray);margin-left:8px;">${app.formatDate(n.created_at)}</span>
                    </div>
                </div>
                <p style="margin:8px 0 4px;font-size:14px;"><strong>${n.subject || ''}</strong></p>
                <p style="margin:0;font-size:13px;color:var(--gray);">${n.message || ''}</p>
            </div>`;
        });
        container.innerHTML = html;
    } catch (err) {
        document.getElementById('notification-list').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
}

loadNotifications();
</script>
</body></html>
