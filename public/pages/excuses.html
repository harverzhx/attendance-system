<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excuse Slips</title><link rel="stylesheet" href="/css/style.css">
<style>
    .excuse-card { padding:16px; border:1px solid var(--border); border-radius:8px; margin-bottom:12px; }
    .excuse-card:hover { background:#f8fafc; }
    .badge-pending { background:#fef3c7;color:#d97706; }
    .badge-teacher-approved { background:#dbeafe;color:#2563eb; }
    .badge-approved { background:#f0fdf4;color:#16a34a; }
    .badge-rejected { background:#fef2f2;color:#dc2626; }
    .excuse-photo { width:40px; height:40px; border-radius:50%; object-fit:cover; margin-right:12px; }
    .action-bar { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
</style>
</head><body>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
<div class="topbar" id="topbar"></div>
<div id="alert-container"></div>

<div class="filter-bar">
    <div class="form-group"><label>Status</label><select class="form-select" id="statusFilter"><option value="">All</option><option value="Pending">Pending</option><option value="Teacher Approved">Teacher Approved</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option></select></div>
    <div class="form-group"><label>Type</label><select class="form-select" id="typeFilter"><option value="">All</option><option value="Absent">Absent</option><option value="Late">Late</option></select></div>
    <div class="form-group"><label>Date</label><input type="date" class="form-control" id="dateFilter"></div>
    <button class="btn btn-primary" onclick="loadExcuses()">Filter</button>
    <button class="btn btn-outline" onclick="resetFilters()">Reset</button>
</div>

<div class="card">
    <div class="card-header flex-between">
        <span>Excuse Slips</span>
        <span id="countBadge" style="font-size:14px;"></span>
    </div>
    <div id="excuseList"><p style="text-align:center;padding:40px;color:var(--gray);">Loading...</p></div>
</div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js?v=1"></script>
<script>
auth.requireAuth();
const role = auth.getRole();
const user = auth.getUser();

async function loadExcuses() {
    try {
        const params = new URLSearchParams();
        const s = document.getElementById('statusFilter').value;
        const t = document.getElementById('typeFilter').value;
        const d = document.getElementById('dateFilter').value;
        if (s) params.set('status', s);
        if (t) params.set('type', t);
        if (d) params.set('date', d);

        const r = await api.get('/excuses?' + params.toString());
        const data = r.data || [];
        document.getElementById('countBadge').textContent = `${data.length} excuse(s)`;

        if (data.length === 0) {
            document.getElementById('excuseList').innerHTML = '<p style="text-align:center;padding:40px;color:var(--gray);">No excuse records found.</p>';
            return;
        }

        let html = '';
        data.forEach(e => {
            const statusClass = 'badge-' + e.status.toLowerCase().replace(/\s+/g, '-');
            const isPending = e.status === 'Pending';
            const isTeacherApproved = e.status === 'Teacher Approved';
            const canTeacherApprove = isPending && (role === 'Admin' || role === 'Teacher');
            const canFinalApprove = isTeacherApproved && (role === 'Admin' || role === 'Adviser');
            const canReject = (role === 'Admin' || role === 'Teacher' || role === 'Adviser');

            html += `<div class="excuse-card" id="excuse-${e.excuse_id}">
                <div style="display:flex;align-items:flex-start;gap:12px;">
                    ${e.student_photo ? `<img src="${e.student_photo}" class="excuse-photo">` : `<div class="excuse-photo" style="background:#e2e8f0;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#64748b;font-size:16px;">${(e.student_name || '?')[0]}</div>`}
                    <div style="flex:1;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <strong>${e.student_name}</strong>
                                <span class="badge ${statusClass}">${e.status}</span>
                                <span class="badge ${e.type === 'Absent' ? 'badge-out' : 'badge-warning'}">${e.type}</span>
                                <small style="color:var(--gray);margin-left:8px;">${e.student_number || ''} · ${e.grade_level || ''} ${e.section_name || ''}</small>
                            </div>
                            <small style="color:var(--gray);">${e.excuse_date}</small>
                        </div>
                        <p style="margin:8px 0;"><strong>Reason:</strong> ${e.reason}</p>
                        ${e.document_path ? `<p style="margin:4px 0;"><a href="${e.document_path}" target="_blank">📎 View Attachment</a></p>` : ''}
                        <div style="font-size:12px;color:var(--gray);margin:4px 0;">
                            Submitted by: ${e.submitted_by} · ${app.formatDateTime(e.created_at)}
                            ${e.teacher_reviewed_by ? `· Teacher Reviewed: ${app.formatDateTime(e.teacher_reviewed_at)}` : ''}
                            ${e.approved_at ? `· ${e.status === 'Rejected' ? 'Rejected' : 'Approved'}: ${app.formatDateTime(e.approved_at)}` : ''}
                            ${e.rejection_reason ? `<br><strong>Rejection reason:</strong> ${e.rejection_reason}` : ''}
                            ${e.attendance_status ? `<br><strong>Attendance status:</strong> ${e.attendance_status}` : ''}
                        </div>
                        <div class="action-bar">
                            ${canTeacherApprove ? `<button class="btn btn-primary btn-sm" onclick="teacherApprove(${e.excuse_id})">✓ Approve (Teacher)</button>` : ''}
                            ${canFinalApprove ? `<button class="btn btn-success btn-sm" onclick="finalApprove(${e.excuse_id})">✓ Final Approve</button>` : ''}
                            ${canReject ? `<button class="btn btn-danger btn-sm" onclick="rejectExcuse(${e.excuse_id})">✗ Reject</button>` : ''}
                            ${role === 'Admin' ? `<button class="btn btn-outline btn-sm" onclick="deleteExcuse(${e.excuse_id})">🗑 Delete</button>` : ''}
                        </div>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('excuseList').innerHTML = html;
    } catch (err) {
        document.getElementById('excuseList').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
    }
}

async function teacherApprove(id) {
    if (!confirm('Approve this excuse as Teacher?')) return;
    try { await api.post(`/excuses/${id}/teacher-approve`); app.showAlert('Excuse approved by teacher', 'success'); loadExcuses(); }
    catch (err) { app.showAlert(err.message, 'danger'); }
}

async function finalApprove(id) {
    if (!confirm('Final approve this excuse?')) return;
    try { await api.post(`/excuses/${id}/approve`); app.showAlert('Excuse fully approved', 'success'); loadExcuses(); }
    catch (err) { app.showAlert(err.message, 'danger'); }
}

async function rejectExcuse(id) {
    const reason = prompt('Enter rejection reason:');
    if (reason === null) return;
    try { await api.post(`/excuses/${id}/reject`, { reason }); app.showAlert('Excuse rejected', 'warning'); loadExcuses(); }
    catch (err) { app.showAlert(err.message, 'danger'); }
}

async function deleteExcuse(id) {
    if (!confirm('Delete this excuse record permanently?')) return;
    try { await api.del(`/excuses/${id}`); app.showAlert('Excuse deleted', 'info'); loadExcuses(); }
    catch (err) { app.showAlert(err.message, 'danger'); }
}

function resetFilters() {
    document.getElementById('statusFilter').value = '';
    document.getElementById('typeFilter').value = '';
    document.getElementById('dateFilter').value = '';
    loadExcuses();
}

document.getElementById('dateFilter').value = app.localDate();
loadExcuses();
</script>
</body></html>
