<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/img/LogoINSH.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ilaya NHS Attendance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">
                <img src="/img/LogoINSH.png" alt="Ilaya NHS" style="width:64px;height:64px;border-radius:10px;object-fit:contain;margin-bottom:8px;">
                <h2>Ilaya National High School</h2>
                <p style="color: #64748b; font-size: 14px;">Attendance Monitoring System</p>
            </div>
            <div id="alert-container"></div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position:relative">
                        <input type="password" class="form-control" id="password" placeholder="Enter password">
                        <span id="togglePass" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;user-select:none;font-size:14px;color:#64748b">Show</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>
            </form>
            <div style="text-align:center; margin-top:20px;">
                <a href="/pages/register.html" style="color: var(--primary); text-decoration: none; font-size: 14px;">Register Account</a>
            </div>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('togglePass').onclick = function() {
            const pwd = document.getElementById('password');
            const isPass = pwd.type === 'password';
            pwd.type = isPass ? 'text' : 'password';
            this.textContent = isPass ? 'Hide' : 'Show';
        };

        if (auth.isLoggedIn()) auth.redirectToDashboard();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#loginForm button[type="submit"]');
            btn.disabled = true; btn.textContent = 'Signing in...';

            try {
                await auth.login(
                    document.getElementById('username').value,
                    document.getElementById('password').value
                );
                auth.redirectToDashboard();
            } catch (err) {
                const msg = err?.message || 'Login failed';
                const el = document.getElementById('alert-container');
                if (el) {
                    el.innerHTML = `<div class="alert alert-danger">${msg}</div>`;
                }
            } finally {
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
